<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
</head>
<body>
    <h1>Challenge 2_24.11.5939</h1>
    
    
        <table>
            <b>Isilah formulir dibawah ini</b>
            <tr>
                <td>Name:</td>
                <td> <input type="text"></td>
            </tr>
            <tr>
                <td>Email:</td>
                <td> <input type="text"></td>
            </tr>
            <tr>
                <td>Date of birth:</td>
                <td> <input type="text"></td>
            </tr>
            <tr>
                <td>Jenis Kelamin:</td>
                <td> <input type="radio" name="gender" value="M">Male 
                    <input type="radio" name="gender" value="F">Female </td>
            </tr>
            <tr>
                <td>Hobi:</td>
                <td> <input type="checkbox" name="hobi" value="membaca buku">Membaca Buku 
                    <input type="checkbox" name="hobi" value="menulis">Menulis
                    <input type="checkbox" name="hobi" value="memancing">Memancing</td>
            </tr>
            <tr>
                <td>Asal Kota: </td>
                <td><select name="kota">
                    <option value="semarang">Semarang</option>
                    <option value="jogja">Jogja</option>
                    <option value="surabaya">Surabaya</option> 
                    </select>
                </td>
            </tr>
            <tr>
                <td>Komentar Anda:</td>
                <td> <textarea name="" cols="50" rows="5">Silahkan katakan isi hati anda</textarea> </td>
                    
            </tr>
            <tr>
                <td><input type="button" value="Mulai Proses!"></td>
            </tr>
        </table>
</body>
</html>
